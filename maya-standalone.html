<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maya - Scan My Shadow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #d4af37;
  --gold-soft: rgba(212,175,55,0.16);
  --gold-border: rgba(212,175,55,0.28);
  --bg: #111011;
  --panel: rgba(19,18,18,0.98);
  --surface: rgba(255,255,255,0.055);
  --surface-strong: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.12);
  --text: #f7f3e8;
  --muted: rgba(247,243,232,0.62);
  --soft: rgba(247,243,232,0.46);
  --shadow: 0 34px 90px rgba(0,0,0,0.72), 0 0 0 1px rgba(212,175,55,0.14);
  --vvh: 100dvh;
}

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  font-family: Inter, system-ui, sans-serif;
  font-size: 15.2px;
  color: var(--text);
  overflow: hidden;
}

/* Background grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* Glow top */
body::after {
  content: '';
  position: fixed;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(212,175,55,0.07), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Page layout */
#page {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
}

/* Logo bar */
#logo-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  opacity: 0;
  animation: fade-up 0.5s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
}

#logo-bar img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
}

#logo-bar span {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

#logo-bar .dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold-border);
}

/* Chat card */
#chat-card {
  width: 100%;
  max-width: 460px;
  height: min(680px, calc(var(--vvh) - 120px));
  background:
    radial-gradient(circle at 50% 0%, rgba(212,175,55,0.07), transparent 45%),
    linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.022)),
    var(--panel);
  border-radius: 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gold-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px) scale(0.98);
  animation: fade-up 0.55s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
}

@keyframes fade-up {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Header */
.chat-header {
  padding: 20px 20px 17px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(212,175,55,0.08), rgba(255,255,255,0.015));
  flex-shrink: 0;
}

.chat-header-top {
  display: flex;
  align-items: center;
  gap: 12px;
}

.maya-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #d4af37, #7a5f10);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  font-weight: 800;
  color: #000;
  flex-shrink: 0;
  position: relative;
}

.maya-avatar::after {
  content: '';
  position: absolute;
  bottom: 1px;
  right: 1px;
  width: 10px;
  height: 10px;
  background: #3ecf8e;
  border-radius: 50%;
  border: 2px solid #141214;
}

.maya-info { flex: 1; }

.maya-name {
  font-size: 19px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}

.maya-role {
  font-size: 12.2px;
  color: var(--muted);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.chat-header-sub {
  margin-top: 11px;
  font-size: 12.8px;
  color: rgba(247,243,232,0.64);
  font-weight: 500;
  line-height: 1.5;
}

/* Messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 17px 16px 9px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}

#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }

.bubble {
  max-width: 84%;
  padding: 11px 14px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.58;
  animation: bubble-in 0.3s cubic-bezier(0.16,1,0.3,1) both;
  white-space: pre-wrap;
}

@keyframes bubble-in {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.bubble.maya {
  align-self: flex-start;
  background: rgba(255,255,255,0.055);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 6px;
}

.bubble.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #d4af37, #b8962e);
  color: #000;
  font-weight: 700;
  border-bottom-right-radius: 6px;
}

.typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 12px 16px;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.4;
  animation: typing 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 100% { opacity: 0.25; transform: translateY(0); }
  50% { opacity: 0.9; transform: translateY(-3px); }
}

.cap-note {
  text-align: center;
  font-size: 12.2px;
  color: var(--muted);
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  border: 1px solid var(--border);
  margin: 4px auto;
  max-width: 90%;
}

.gold-divider {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-border), transparent);
  flex-shrink: 0;
}

/* Footer */
.chat-footer {
  padding: 13px 14px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: rgba(0,0,0,0.24);
}

#chat-input {
  flex: 1;
  background: rgba(255,255,255,0.055);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 11px 14px;
  color: var(--text);
  font-family: Inter, system-ui, sans-serif;
  font-size: 15px;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 86px;
  line-height: 1.5;
  transition: border-color 0.2s, background 0.2s;
}

#chat-input::placeholder { color: var(--soft); }
#chat-input:focus {
  border-color: var(--gold-border);
  background: rgba(255,255,255,0.075);
}

#send-btn {
  width: 42px;
  height: 42px;
  border-radius: 13px;
  background: linear-gradient(180deg, #d4af37, #b8962e);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s ease, opacity 0.15s;
}

#send-btn:hover { transform: scale(1.05); }
#send-btn:active { transform: scale(0.95); }
#send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
#send-btn svg { width: 18px; height: 18px; fill: #000; }

/* Scan ID gate */
#scan-id-gate {
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.18);
}

.gate-label {
  font-size: 13.2px;
  color: var(--muted);
  line-height: 1.5;
}

.gate-label strong { color: var(--gold); font-weight: 800; }

.gate-row { display: flex; gap: 8px; }

#scan-id-input {
  flex: 1;
  background: rgba(255,255,255,0.055);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 10px 13px;
  color: var(--text);
  font-family: Inter, system-ui, sans-serif;
  font-size: 14.2px;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 1px;
  min-width: 0;
}

#scan-id-input::placeholder { color: var(--soft); letter-spacing: 0; }
#scan-id-input:focus { border-color: var(--gold-border); }

#scan-id-btn {
  padding: 10px 16px;
  border-radius: 11px;
  background: linear-gradient(180deg, #d4af37, #b8962e);
  border: none;
  cursor: pointer;
  font-family: Inter, system-ui, sans-serif;
  font-size: 13.2px;
  font-weight: 800;
  color: #000;
}

/* Mobile */
@media (max-width: 520px) {
  #page { padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); justify-content: flex-end; }
  #logo-bar { margin-bottom: 12px; }
  #chat-card {
    max-width: 100%;
    border-radius: 20px 20px 0 0;
    height: calc(var(--vvh) - 80px);
  }
  .bubble { max-width: 88%; font-size: 14.6px; }
  .chat-footer { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); }
  #chat-input { max-height: 72px; font-size: 14.8px; }
  .gate-row { flex-direction: column; }
  #scan-id-btn { width: 100%; }
}
</style>
</head>

<body>
<div id="page">

  <div id="logo-bar">
    <img src="https://scanmyshadow.com/favicon.ico" onerror="this.style.display='none'" alt="">
    <span>Scan My Shadow</span>
    <div class="dot"></div>
    <span style="color:var(--gold);font-size:12px;">Private</span>
  </div>

  <div id="chat-card">
    <div class="chat-header">
      <div class="chat-header-top">
        <div class="maya-avatar">M</div>
        <div class="maya-info">
          <div class="maya-name">Maya</div>
          <div class="maya-role">Privacy Assistant</div>
        </div>
      </div>
      <div class="chat-header-sub" id="header-sub">Ask me anything about your privacy, or how this works.</div>
    </div>

    <div id="messages"></div>

    <div class="gold-divider"></div>

    <div id="scan-id-gate" style="display:none;">
      <div class="gate-label">Have a report? Enter your <strong>Scan ID</strong> to unlock full Q&amp;A.</div>
      <div class="gate-row">
        <input id="scan-id-input" type="text" placeholder="pay_XXXXXXXX" maxlength="32" autocomplete="off" spellcheck="false">
        <button id="scan-id-btn" onclick="submitScanId()">Verify</button>
      </div>
    </div>

    <div class="chat-footer">
      <textarea id="chat-input" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
const WEBHOOK_VISITOR = 'https://hook.eu1.make.com/ne7fdtchxqy2ods89qg7yw0iicv05gqi';
const WEBHOOK_PAID    = 'https://hook.eu1.make.com/flm74p8mf9b2qu283zcyef4hdhrsjb86';

let scanId       = null;
let messageCount = 0;
let capReached   = false;
let sessionId    = null;

function init() {
  sessionId = 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();

  const params = new URLSearchParams(window.location.search);
  const idFromUrl = params.get('id') || params.get('scan_id');
  if (idFromUrl && idFromUrl.length > 4) scanId = idFromUrl;

  setViewportHeight();
  enableInput();
  showWelcome();
}

function setViewportHeight() {
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--vvh', h + 'px');
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', setViewportHeight);
}
window.addEventListener('resize', setViewportHeight);

function showWelcome() {
  const isPaid = !!scanId;
  setTimeout(() => {
    if (isPaid) {
      document.getElementById('header-sub').textContent = 'Your report assistant. Ask me anything.';
      addBubble('maya', "Namaste. I can see you have a report with us.\n\nAsk me what a finding means, whether something is serious, or what to do next.");
    } else {
      addBubble('maya', "Namaste. I am Maya.\n\nI can answer questions about Scan My Shadow, how it works, what we scan, and what happens to your data.\n\nWhat would you like to know?");
    }
    document.getElementById('chat-input').focus();
  }, 500);
}

function addBubble(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.innerHTML = text.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'bubble maya typing-indicator';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.id = 'typing';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || capReached) return;

  input.value = '';
  autoResize(input);
  document.getElementById('send-btn').disabled = true;

  addBubble('user', text);
  messageCount++;

  showTyping();
  setInputLocked(true);

  try {
    const payload = {
      session_id: sessionId,
      scan_id: scanId || null,
      message: text,
      message_count: messageCount,
      message_type: 'Text'
    };

    const WEBHOOK = scanId ? WEBHOOK_PAID : WEBHOOK_VISITOR;

    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    hideTyping();

    const reply = data.reply || data.message || "I am sorry, I could not process that. Please try again.";
    addBubble('maya', reply);

    if (data.cap_reached || messageCount >= (scanId ? 5 : 3)) {
      capReached = true;
      showCapNote();
    }
  } catch(e) {
    hideTyping();
    addBubble('maya', 'Something went wrong on my end. Please try again in a moment.');
  }

  setInputLocked(false);
  if (!capReached) {
    document.getElementById('send-btn').disabled = false;
    document.getElementById('chat-input').focus();
  }
}

function showCapNote() {
  const msgs = document.getElementById('messages');
  const note = document.createElement('div');
  note.className = 'cap-note';
  note.textContent = "That is all for now. For further help, email support@scanmyshadow.com";
  msgs.appendChild(note);
  msgs.scrollTop = msgs.scrollHeight;
  setInputLocked(true);
  document.getElementById('send-btn').disabled = true;
}

function submitScanId() {
  const input = document.getElementById('scan-id-input');
  const val = input.value.trim();
  if (val.length < 6) {
    input.style.borderColor = '#e05c5c';
    setTimeout(() => input.style.borderColor = '', 1500);
    return;
  }
  scanId = val;
  document.getElementById('scan-id-gate').style.display = 'none';
  document.getElementById('header-sub').textContent = 'Your report assistant. Ask me anything.';
  addBubble('maya', "Scan ID verified.\n\nAsk me anything about your report, what a finding means, how serious something is, or what to do next.");
  enableInput();
}

function enableInput() {
  const input = document.getElementById('chat-input');
  input.addEventListener('input', () => {
    document.getElementById('send-btn').disabled = input.value.trim() === '' || capReached;
  });
}

function setInputLocked(locked) {
  const input = document.getElementById('chat-input');
  input.disabled = locked;
  if (!locked) input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!document.getElementById('send-btn').disabled) sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 86) + 'px';
}

init();
</script>
</body>
</html>
